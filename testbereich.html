<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteboard Layout</title>
    <link rel="stylesheet" href="style.css">
<Style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: sans-serif;
}

body {
    background-color: #f4f4f4;
}

.container {
    display: grid;
    grid-template-columns: 1fr 200px; /* Hauptbereich + Aside */
    min-height: 100vh;
}

/* Linke Spalte */
.left-column {
    display: flex;
    flex-direction: column;
    border-right: 2px solid #0056b3;
}

/* Navigation */
.nav {
    background: #333;
    color: white;
    padding: 10px;
    text-align: center;
}

/* Header Bereich (Rot im Entwurf) */
.header {
    background: #801515;
    color: white;
    padding: 40px 20px;
    border-bottom: 2px dashed #ccc;
}

.header-content {
    display: flex;
    justify-content: space-around;
    align-items: center;
}

.wrapper {
    border-left: 1px solid white;
    border-right: 1px solid white;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
}

/* TXT Divider */
.txt-divider {
    text-align: center;
    padding: 5px;
    border-bottom: 1px solid #ccc;
    font-size: 0.8rem;
    color: #666;
}

/* Main Bereich (Orange im Entwurf) */
.main-content {
    flex-grow: 1;
    padding: 20px;
    background: white;
    border: 2px solid orange;
    margin: 10px;
    display: flex;
    flex-direction: column;
}

.scroll-area {
    overflow: auto; /* Aktiviert Scrollen x und y */
    max-height: 400px; 
    border: 1px inset #eee;
    padding: 10px;
}

/* Footer (Grün im Entwurf) */
.footer {
    background: white;
    border: 2px solid green;
    margin: 10px;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.footer ul {
    list-style: none;
    display: flex;
    gap: 20px; /* Flexbox für die Liste */
}

/* Sidebar (Blau) */
.sidebar {
    background: #eef2f7;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    color: #0056b3;
    font-weight: bold;
}
</Style>
</head>
<body>

    <div class="container">
        <div class="left-column">
            
            <nav class="nav">Nav 60%</nav>

            <header class="header">
                <div class="header-content">
                    <h1>Bild</h1>
                    <div class="wrapper">
                        <span>Wrapper</span>
                        <span>Bild</span>
                        <span>Test</span>
                    </div>
                </div>
            </header>

            <div class="txt-divider">TXT</div>

            <main class="main-content">
                <p>overflow - x - y (scroll)</p>
                <div class="scroll-area">
                    <p>Placeholder Content...</p>
                    <div style="height: 1000px; background: linear-gradient(white, #f0f0f0);"></div>
                </div>
            </main>

            <footer class="footer">
                <ul>
                    <li>margin: ---</li>
                    <li>flex: ---</li>
                </ul>
                <div class="check-mark">✔</div>
            </footer>

        </div>

        <aside class="sidebar">
            &lt;aside&gt;
        </aside>
    </div>

</body>
</html>

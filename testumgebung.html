<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /* 1. Grund-Setup & Body-Abstand für den Footer */
body {
  margin: 0;
  padding: 0;
  padding-bottom: 80px; /* Platzhalter, damit der Footer nichts verdeckt */
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: #f9f9f9;
}

/* 2. Main-Container (Zentriert auf 1260px) */
main {
  max-width: 1260px;
  margin: 0 auto;
  padding: 40px 20px;
}

.intro-text {
  margin-bottom: 30px;
}

/* 3. Fotostrecke (Horizontal scrollbar) */
.photo-gallery {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  padding-bottom: 20px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}

.photo-item {
  flex: 0 0 400px; /* Feste Breite der Bilder */
  scroll-snap-align: start;
}

.photo-item img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  display: block;
}

.photo-item p {
  margin-top: 10px;
  font-size: 0.9rem;
  color: #555;
}

/* Scrollbar-Styling für die Fotostrecke */
.photo-gallery::-webkit-scrollbar {
  height: 6px;
}
.photo-gallery::-webkit-scrollbar-track {
  background: #eee;
}
.photo-gallery::-webkit-scrollbar-thumb {
  background: #ccc;
  border-radius: 10px;
}

/* 4. Fixierter Footer (Waagerecht am unteren Rand) */
footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background-color: #1a1a1a;
  padding: 15px 0;
  z-index: 1000;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
}

footer ul {
  max-width: 1260px; /* Gleiche Breite wie der Main-Content */
  margin: 0 auto;
  padding: 0 20px;
  list-style: none;
  display: flex;
  flex-direction: row;      /* Waagerecht */
  justify-content: flex-end; /* Sortiert von rechts nach links */
  gap: 25px;
  overflow-x: auto;         /* Falls die Liste auf Mobilgeräten zu lang ist */
}

footer li {
  white-space: nowrap;
}

footer a {
  color: #ffffff;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.3s ease, transform 0.2s;
  display: inline-block;
}

footer a:hover {
  color: #00d1b2;
  transform: translateY(-2px);
}

/* Responsive Anpassung für kleine Bildschirme */
@media (max-width: 480px) {
  .photo-item {
    flex: 0 0 85%; /* Bilder nehmen fast die ganze Breite ein */
  }
}
</style>
</head>
<body>
<nav>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#services">Dienstleistungen</a></li>
        <li><a href="#contact">Kontakt</a></li>
    </ul>
</nav>


</body>
</html>
